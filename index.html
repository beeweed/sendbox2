<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E2B Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <style>
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0d1117; 
      }
      ::-webkit-scrollbar-thumb {
        background: #30363d; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #484f58; 
      }
      body {
        background-color: #0d1117;
        color: #c9d1d9;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      /* XTerm container styling — critical for TUI/fullscreen apps */
      .xterm {
        padding: 4px;
        height: 100%;
      }
      .xterm-viewport {
        overflow-y: auto !important;
        scrollbar-width: thin;
        scrollbar-color: #30363d #0d1117;
      }
      .xterm-screen {
        height: 100%;
      }

      /* Ensure box drawing characters render correctly */
      .xterm-char-measure-element {
        display: inline-block !important;
      }

      /* Smooth cursor for bar style */
      .xterm-cursor-bar {
        border-left-width: 2px !important;
      }

      /* Better link styling */
      .xterm-underline-1 { text-decoration: underline; }
      .xterm-underline-2 { text-decoration: double underline; }
      .xterm-underline-3 { text-decoration: wavy underline; }
      .xterm-underline-4 { text-decoration: dotted underline; }
      .xterm-underline-5 { text-decoration: dashed underline; }

      /* Selection styling */
      .xterm .xterm-selection div {
        background-color: rgba(38, 79, 120, 0.6) !important;
      }

      /* Terminal container reset — prevent inherited styles from breaking TUI layout */
      .terminal-container {
        line-height: normal;
        font-variant-ligatures: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Override xterm-rows to ensure proper character grid alignment */
      .xterm-rows {
        font-feature-settings: "liga" 0, "calt" 0;
      }

      /* Ensure canvas renders at proper resolution */
      .xterm canvas {
        image-rendering: optimizeSpeed;
      }

      /* Link hover */
      .xterm a:hover {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
